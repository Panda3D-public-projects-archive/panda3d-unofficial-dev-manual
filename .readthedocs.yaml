# Read the Docs configuration file (v2).
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: conf.py
  # Fail the build on warnings to catch broken cross-references early. The known
  # MyST heading-anchor false-positive is suppressed in conf.py, so a warning
  # here means something genuinely broke.
  fail_on_warning: true

# Build all offered formats (PDF + ePub) in addition to HTML.
formats:
  - pdf
  - epub

# Install the docs toolchain declared in pyproject.toml.
python:
  install:
    - method: pip
      path: .
